<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カードと暮らす日々記事ナビ</title>
  <style>
    :root {
      color-scheme: light;
      --lavender: #eee9f7;
      --lavender-deep: #7c6a9f;
      --cream: #fffaf0;
      --ink: #36313d;
      --title: #665477;
      --muted: #514959;
      --sage: #dfe9dd;
      --rose: #f4dadd;
      --line: rgba(94, 79, 115, 0.18);
      --shadow: 0 18px 45px rgba(73, 61, 92, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      line-height: 1.7;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(244, 218, 221, 0.58), transparent 32rem),
        linear-gradient(135deg, var(--lavender), var(--cream) 58%, #f8f1e7);
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0;
      color: var(--lavender-deep);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      color: var(--title);
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1.18;
      letter-spacing: 0;
      font-weight: 700;
    }

    .lead {
      max-width: 43rem;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .search-panel {
      display: grid;
      gap: 16px;
      padding: 18px;
      margin: 26px 0 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    input[type="search"] {
      width: 100%;
      min-height: 48px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input[type="search"]:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(124, 106, 159, 0.32);
      outline-offset: 3px;
    }

    .clear-button,
    .read-button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .clear-button {
      padding: 0 16px;
      color: var(--lavender-deep);
      background: var(--sage);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .hint {
      margin: 0;
    }

    .status {
      margin-left: auto;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.9);
      box-shadow: 0 10px 26px rgba(73, 61, 92, 0.08);
    }

    .card-top {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
    }

    .number {
      display: grid;
      place-items: center;
      width: 3.2rem;
      min-height: 3.2rem;
      border-radius: 8px;
      color: #fff;
      background: var(--lavender-deep);
      box-shadow: 0 10px 22px rgba(124, 106, 159, 0.22);
      font-weight: 800;
      line-height: 1.1;
    }

    .number small {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      opacity: 0.92;
    }

    h2 {
      margin: 0;
      color: var(--title);
      font-size: 1.22rem;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .english {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .article-grid {
      display: grid;
      gap: 10px;
    }

    .article {
      display: grid;
      gap: 8px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(238, 233, 247, 0.38);
    }

    .article[data-empty="true"] {
      background: rgba(223, 233, 221, 0.42);
    }

    .article-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--rose);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .badge.reversed {
      background: var(--sage);
    }

    .date {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .article-title {
      margin: 0;
      color: #3f3847;
      font-size: 0.96rem;
      font-weight: 700;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .empty-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .read-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: start;
      min-width: 8.2rem;
      padding: 0 16px;
      color: #fff;
      background: #5f4d78;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(95, 77, 120, 0.2);
    }

    .clear-button:hover,
    .read-button:hover {
      transform: translateY(-1px);
    }

    .no-results {
      display: none;
      padding: 22px;
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.9);
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .no-results.is-visible {
      display: block;
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 22px, 680px);
        padding: 28px 0 38px;
      }

      .search-row,
      .results {
        grid-template-columns: 1fr;
      }

      .clear-button {
        width: 100%;
      }

      .status {
        width: 100%;
        margin-left: 0;
      }

      .card {
        padding: 15px;
      }
    }

    @media (max-width: 430px) {
      h1 {
        font-size: 2rem;
      }

      .page {
        width: min(100% - 18px, 680px);
      }

      .search-panel {
        padding: 14px;
      }

      .card-top {
        grid-template-columns: 1fr;
      }

      .number {
        width: 100%;
        min-height: 2.8rem;
      }
    }
  </style>
</head>

    <header>
      <p class="eyebrow">Yurutto Tarot Navi</p>

    <section class="results" id="results" aria-live="polite"></section>

  <script>
    const cards = JSON.parse(document.getElementById("cardData").textContent);
    const searchInput = document.getElementById("searchInput");
    const clearButton = document.getElementById("clearButton");
    const results = document.getElementById("results");
    const status = document.getElementById("status");
    const noResults = document.getElementById("noResults");

    const normalize = (value) => value
      .normalize("NFKC")
      .toLowerCase()
      .replace(/the\s+/g, "")
      .replace(/[\s　・\-―—_()（）.]/g, "")
      .trim();

    const exactNumberLike = (query) => {
      const cleaned = normalize(query).replace(/番$/, "");
      if (/^\d+$/.test(cleaned)) return String(Number(cleaned));
      return "";
    };

    const exactRomanLike = (query) => {
      const cleaned = normalize(query);
      if (/^[ivx]+$/.test(cleaned)) return cleaned.toUpperCase();
      if (cleaned === "o") return "O";
      return "";
    };

    function matchesCard(card, rawQuery) {
      const query = normalize(rawQuery);
      if (!query) return true;

      const number = exactNumberLike(rawQuery);
      if (number !== "") return String(card.number) === number || (rawQuery.trim() === "00" && card.number === 0);

      const roman = exactRomanLike(rawQuery);
      if (roman) {
        if (roman === "O") return card.number === 0;
        return card.roman === roman;
      }

      return card.searchTerms.some((term) => normalize(term).includes(query));
    }

    function articleHtml(article, label, isReversed) {
      if (!article) {
        return `
          <div class="article" data-empty="true">
            <div class="article-head">
              <span class="badge ${isReversed ? "reversed" : ""}">${label}</span>
            </div>
            <p class="empty-text">該当記事はまだありません</p>
          </div>
        `;
      }

      return `
        <article class="article">
          <div class="article-head">
            <span class="badge ${isReversed ? "reversed" : ""}">${label}</span>
            <span class="date">${article.publishedAt}</span>
          </div>
          <p class="article-title">${article.title}</p>
          <a class="read-button" href="${article.url}" target="_blank" rel="noopener">記事を読む</a>
        </article>
      `;
    }

    function cardHtml(card) {
      const displayNumber = card.number === 0 ? "0" : String(card.number);
      return `
        <article class="card">
          <div class="card-top">
            <div class="number">
              <span>${displayNumber}</span>
              <small>${card.roman}</small>
            </div>
            <div>
              <h2>${card.nameJa}</h2>
              <p class="english">${card.nameEn}</p>
            </div>
          </div>
          <div class="article-grid">
            ${articleHtml(card.upright, "正位置", false)}
            ${articleHtml(card.reversed, "逆位置", true)}
          </div>
        </article>
      `;
    }

    function render() {
      const query = searchInput.value;
      const visibleCards = cards.filter((card) => matchesCard(card, query));
      results.innerHTML = visibleCards.map(cardHtml).join("");
      status.textContent = `${visibleCards.length} / ${cards.length}枚を表示`;
      noResults.classList.toggle("is-visible", visibleCards.length === 0);
    }

    searchInput.addEventListener("input", render);
    clearButton.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
      render();
    });

    render();
  </script>
